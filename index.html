<div class="modal" id="login-modal">
        <div class="modal-content login-modal-content">
            <span class="close-modal" onclick="closeLoginModal()">&times;</span>
            <h3 style="margin-bottom: 10px; text-align: center; color: var(--primary-color);">📨 邮箱验证码登录 / 注册</h3>
            <p style="font-size: 0.75rem; text-align: center; color: var(--text-muted); margin-bottom: 20px;">
                输入邮箱获取 6 位数字验证码进行验证登录。
            </p>
            
            <form onsubmit="handleLoginSubmit(event)" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="form-group" style="display: flex; flex-direction: column; gap: 12px;">
                    <input type="email" id="login-email" placeholder="请输入您的电子邮箱" required style="width: 100%;">
                    
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAADoPJQLHZti_T_Eu"></div>
                    
                    <button type="button" id="send-otp-btn" onclick="sendEmailOTP()" style="width: 100%;" class="submit-btn">获取验证码</button>
                </div>
                <div class="form-group">
                    <input type="text" id="login-otp" placeholder="请输入 6 位数字验证码" required maxlength="6">
                </div>
                <button type="submit" class="submit-btn" style="width: 100%;">确认验证登录</button>
            </form>
        </div>
    </div>
